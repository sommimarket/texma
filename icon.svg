    <rect x="152" y="854" width="40" height="21" rx="7" transform="rotate(33 172 864)"/>
    <rect x="268" y="820" width="40" height="21" rx="7" transform="rotate(-33 288 830)"/>
    <rect x="292" y="854" width="40" height="21" rx="7" transform="rotate(-33 312 864)"/>
  </g>
  <!-- cierre / zipper -->
  <g fill="#fff">
    <!-- dientes cerrados -->
    <rect x="200" y="330" width="40" height="21" rx="7"/>
    <rect x="240" y="357" width="40" height="21" rx="7"/>
    <rect x="200" y="384" width="40" height="21" rx="7"/>
    <rect x="240" y="411" width="40" height="21" rx="7"/>
    <rect x="200" y="438" width="40" height="21" rx="7"/>
    <rect x="240" y="465" width="40" height="21" rx="7"/>
    <rect x="200" y="492" width="40" height="21" rx="7"/>
    <rect x="240" y="519" width="40" height="21" rx="7"/>
    <rect x="200" y="546" width="40" height="21" rx="7"/>
    <rect x="240" y="573" width="40" height="21" rx="7"/>
    <rect x="200" y="600" width="40" height="21" rx="7"/>
