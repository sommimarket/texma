    <rect x="200" y="546" width="40" height="21" rx="7"/><rect x="240" y="573" width="40" height="21" rx="7"/>
    <rect x="200" y="600" width="40" height="21" rx="7"/>
    <rect x="218" y="624" width="48" height="28" rx="10"/>
    <rect x="186" y="642" width="112" height="82" rx="24"/>
    <rect x="222" y="726" width="40" height="86" rx="16"/>
